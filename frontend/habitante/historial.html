<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIMCA — Historial</title>
  <link rel="stylesheet" href="/css/simca.css">
</head>
<body>
<nav class="nav">
  <div class="nav-left">
    <a class="nav-logo" href="/index.html">&#128167; SIMCA</a>
  </div>
  <div class="nav-status">
    <span class="nav-live"><span class="live-dot"></span> EN VIVO</span>
    <span class="nav-time" id="navTime">—</span>
    <div class="nav-avatar">H</div>
    <span class="nav-user">Habitante</span>
    <span class="nav-role-badge">COMUNIDAD</span>
    <a href="/index.html" class="btn-salir">← Salir</a>
  </div>
</nav>

<div class="tab-nav">
  <a href="/habitante/estado.html" class="tab-btn">MI AGUA</a>
  <a href="/habitante/historial.html" class="tab-btn active">HISTORIAL</a>
</div>

<div class="container" style="padding-top:1.5rem">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
    <div>
      <div class="metric-label" style="font-size:0.65rem;letter-spacing:3px;margin-bottom:0.3rem">HISTORIAL DE ALERTAS — VIÑA DEL MAR</div>
    </div>
    <div class="sector-tabs" id="sectorTabs"></div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Tipo</th>
          <th>Nivel</th>
          <th>Mensaje</th>
          <th>Valor</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="alertasTable">
        <tr><td colspan="6" style="text-align:center;color:#2a4060;padding:2rem">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<footer class="footer">SIMCA v3.0 · SEREMI Región de Valparaíso · 2026</footer>

<script src="/js/config.js"></script>
<script src="/js/simca.js"></script>
<script>
const params = new URLSearchParams(location.search);
let sector = params.get("sector") || "VN-CENTRO";

setInterval(() => { document.getElementById("navTime").textContent = new Date().toLocaleTimeString("es-CL"); }, 1000);
document.getElementById("navTime").textContent = new Date().toLocaleTimeString("es-CL");

function cambiarSector(s) {
  sector = s;
  history.replaceState(null, "", `?sector=${s}`);
  document.querySelectorAll(".sector-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  cargar();
}

async function cargar() {
  try {
    const alertas = await fetchJSON(`/habitante/historial?sector=${sector}`);
    const tbody = document.getElementById("alertasTable");
    if (!alertas.length) {
      tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#2a4060;padding:2rem">Sin alertas registradas para este sector</td></tr>`;
      return;
    }
    tbody.innerHTML = alertas.map(a => `
      <tr>
        <td style="font-family:'JetBrains Mono',monospace;font-size:0.8rem">${formatDate(a.created_at)}</td>
        <td>${a.type}</td>
        <td><span class="${badgeClass(a.level)}">${a.level}</span></td>
        <td style="max-width:300px">${a.message}</td>
        <td><span class="${a.level==='CRITICAL'?'tag-critical':a.level==='WARNING'?'tag-warning':'tag-safe'}">${a.trigger_value.toFixed(2)}</span></td>
        <td><span class="${a.is_active?'badge badge-critical':'badge badge-safe'}">${a.is_active?'ACTIVA':'RESUELTA'}</span></td>
      </tr>
    `).join("");
  } catch(e) { console.error(e); }
}

async function initSectores() {
  try {
    const sectores = await fetchJSON("/sectores");
    const tabs = document.getElementById("sectorTabs");
    tabs.innerHTML = sectores.map(s =>
      `<button class="sector-btn${s.id===sector?' active':''}" onclick="cambiarSector('${s.id}')">${s.name.toUpperCase()}</button>`
    ).join("");
  } catch(e) {}
}

initSectores();
cargar();
</script>
</body>
</html>
